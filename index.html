<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataTools - Procesador de Datos Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Componente de Icono corregido para evitar pantallas en blanco
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        // Limpiar contenido previo
                        iconRef.current.innerHTML = '';
                        // Crear el SVG usando el motor de Lucide
                        const svg = iconData.toSvg({ 
                            size, 
                            class: className,
                            'stroke-width': 2
                        });
                        iconRef.current.innerHTML = svg;
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('textTools');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                // Pequeño delay para asegurar que Lucide esté listo en el DOM
                const timer = setTimeout(() => setIsLoaded(true), 100);
                return () => clearTimeout(timer);
            }, []);

            const handleTabChange = (id) => {
                setActiveTab(id);
                setIsSidebarOpen(false);
            };

            if (!isLoaded) return <div class="flex items-center justify-center min-h-screen bg-slate-900 text-white font-bold">Iniciando DataTools...</div>;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Botón Mobile Menu */}
                    <button 
                        onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                        className="md:hidden fixed top-4 right-4 z-50 p-3 bg-blue-600 text-white rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all"
                    >
                        {isSidebarOpen ? <Icon name="X" size={20} /> : <Icon name="Menu" size={20} />}
                    </button>

                    {/* Sidebar */}
                    <aside className={`
                        fixed inset-y-0 left-0 z-40 w-72 bg-slate-900 text-slate-200 transform transition-transform duration-300 ease-in-out flex flex-col shadow-2xl
                        md:relative md:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}
                    `}>
                        <div className="p-8">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-500 rounded-lg shadow-lg shadow-blue-500/20">
                                    <Icon name="Database" size={24} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-white tracking-tight leading-none">DataTools</h1>
                                    <p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">Enterprise Edition</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-1.5">
                            <div className="text-[10px] text-slate-500 font-semibold uppercase px-4 mb-2 tracking-widest">Herramientas</div>
                            <TabButton icon="Scissors" label="Procesador de Texto" id="textTools" active={activeTab} onClick={handleTabChange} />
                            <TabButton icon="CreditCard" label="Consulta SUBE" id="sube" active={activeTab} onClick={handleTabChange} />
                            <TabButton icon="User" label="Informes Nosis" id="nosis" active={activeTab} onClick={handleTabChange} />
                            
                            <div className="text-[10px] text-slate-500 font-semibold uppercase px-4 mt-8 mb-2 tracking-widest">Seguridad</div>
                            <div className="px-4 py-4 bg-slate-800/30 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
                                <div className="flex items-center gap-2 text-green-400 mb-2">
                                    <Icon name="ShieldCheck" size={14} />
                                    <span className="text-xs font-bold uppercase tracking-tighter">Modo Privado Activo</span>
                                </div>
                                <p className="text-[10px] text-slate-400 leading-relaxed text-[11px]">
                                    Procesamiento 100% en cliente. Tus datos no tocan la nube.
                                </p>
                            </div>
                        </nav>

                        <div className="p-6 border-t border-slate-800">
                            <div className="flex items-center gap-3 text-slate-500">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                                <span className="text-xs font-medium">Motor JS: Online</span>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto relative bg-[#f8fafc]">
                        <div className="max-w-5xl mx-auto p-6 md:p-12 animate-fade-in">
                            {activeTab === 'textTools' && <TextToolsPanel Icon={Icon} />}
                            {activeTab === 'sube' || activeTab === 'nosis' ? (
                                <PlaceholderPanel title={activeTab === 'sube' ? "Consulta SUBE" : "Módulo Nosis"} icon={activeTab === 'sube' ? "CreditCard" : "User"} Icon={Icon} />
                            ) : null}
                        </div>
                    </main>
                </div>
            );
        };

        const TabButton = ({ icon, label, id, active, onClick }) => (
            <button
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 group ${
                    active === id
                        ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30'
                        : 'hover:bg-slate-800 text-slate-400 hover:text-white'
                }`}
            >
                <Icon name={icon} size={18} className={`${active === id ? 'text-white' : 'text-slate-500 group-hover:text-blue-400'} transition-colors`} />
                <span className="font-semibold text-sm">{label}</span>
            </button>
        );

        const TextToolsPanel = ({ Icon }) => {
            const [fileContent, setFileContent] = useState(null);
            const [fileName, setFileName] = useState('');
            const [logs, setLogs] = useState([]);
            const fileInputRef = useRef(null);

            const addLog = (msg, type = 'info') => {
                setLogs(prev => [{ msg, type, time: new Date().toLocaleTimeString() }, ...prev].slice(0, 50));
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setFileContent(event.target.result);
                    setFileName(file.name);
                    addLog(`Archivo "${file.name}" cargado.`, 'success');
                };
                reader.readAsText(file);
            };

            const downloadFile = (name, content) => {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                addLog(`Descargado: ${name}`, 'success');
            };

            const handleLimpiar = () => {
                if (!fileContent) return addLog("Sube un archivo primero", "error");
                const cleaned = fileContent.split('\n').map(line => {
                    if (!line.includes(':')) return line;
                    const parts = line.split(':');
                    return (line.toLowerCase().startsWith('http') && parts.length >= 3) ? parts.slice(2).join(':') : parts.slice(1).join(':');
                }).filter(l => l.trim() !== '');
                downloadFile(`limpio_${fileName}`, cleaned.join('\n'));
            };

            const handleFiltroEdad = () => {
                if (!fileContent) return addLog("Sube un archivo primero", "error");
                const lines = fileContent.split('\n');
                const filtrados = [];
                addLog("Filtrando rango 60-90 años...", "info");
                lines.forEach(line => {
                    const dniMatch = line.match(/(?:^|\D)(\d{7,8})(?:\D|$)/);
                    if (dniMatch) {
                        const dni = parseInt(dniMatch[1]);
                        // Rango aproximado 60-90 años (Argentina)
                        if (dni >= 4000000 && dni <= 18500000) filtrados.push(line);
                    }
                });
                if (filtrados.length > 0) {
                    addLog(`Encontrados: ${filtrados.length}`, "success");
                    downloadFile(`filtro_60_90_${fileName}`, filtrados.join('\n'));
                } else addLog("Sin coincidencias en el rango.", "error");
            };

            const handleParsear = () => {
                if (!fileContent) return addLog("Sube un archivo primero", "error");
                const n = parseInt(prompt("Cantidad de líneas aleatorias:"));
                if (isNaN(n) || n <= 0) return;
                const lines = fileContent.split('\n').filter(l => l.trim() !== '');
                const shuffled = [...lines].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, Math.min(n, lines.length));
                downloadFile(`aleatorio_${n}.txt`, selected.join('\n'));
            };

            const handleBuscar = () => {
                if (!fileContent) return addLog("Sube un archivo primero", "error");
                const term = prompt("Buscar término:");
                if (!term) return;
                const results = fileContent.split('\n').filter(l => l.toLowerCase().includes(term.toLowerCase()));
                if (results.length) downloadFile(`busqueda_${term}.txt`, results.join('\n'));
                else addLog("Sin resultados.", "error");
            };

            return (
                <div className="space-y-8">
                    <header className="flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-slate-200 pb-8">
                        <div>
                            <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">Procesador de Datos</h2>
                            <p className="text-slate-500 mt-2 text-lg">Optimización local de bases de datos .txt</p>
                        </div>
                        <div className="px-4 py-2 bg-blue-50 text-blue-700 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 border border-blue-100">
                            <Icon name="History" size={14} /> Historial Local: ON
                        </div>
                    </header>

                    <section className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-6">
                            <div 
                                className={`relative border-2 border-dashed rounded-[2rem] p-12 transition-all duration-300 flex flex-col items-center justify-center cursor-pointer group shadow-sm ${fileContent ? 'border-blue-400 bg-blue-50/20' : 'border-slate-300 bg-white hover:border-blue-400 hover:bg-slate-50'}`}
                                onClick={() => fileInputRef.current.click()}
                            >
                                <div className={`p-5 rounded-2xl mb-4 transition-transform group-hover:scale-110 ${fileContent ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/40' : 'bg-slate-100 text-slate-400'}`}>
                                    <Icon name="FileText" size={40} />
                                </div>
                                <h3 className="text-xl font-bold text-slate-800">{fileContent ? fileName : 'Cargar base de datos'}</h3>
                                <p className="text-slate-500 mt-1 text-center max-w-xs text-sm">Haz clic para buscar un archivo .txt en tu PC.</p>
                                <input type="file" accept=".txt" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <ToolButton icon="Eraser" title="Limpieza Estándar" desc="Quita URL y protocolos de las líneas." onClick={handleLimpiar} disabled={!fileContent} Icon={Icon} />
                                <ToolButton icon="Scissors" title="Extracción Aleatoria" desc="Extrae una muestra aleatoria de N líneas." onClick={handleParsear} disabled={!fileContent} Icon={Icon} />
                                <ToolButton icon="Calendar" title="Filtro de Edad" desc="Extrae personas 60-90 años (DNI Argentino)." onClick={handleFiltroEdad} disabled={!fileContent} isSpecial={true} Icon={Icon} />
                                <ToolButton icon="Search" title="Buscador por Filtro" desc="Extrae líneas que contengan palabras clave." onClick={handleBuscar} disabled={!fileContent} Icon={Icon} />
                            </div>
                        </div>

                        <div className="lg:col-span-1">
                            <div className="bg-slate-900 rounded-[2rem] p-6 shadow-2xl h-full flex flex-col min-h-[500px] border border-slate-800">
                                <div className="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
                                    <span className="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Live Monitoring</span>
                                    <div className="flex gap-1.5">
                                        <div className="w-2 h-2 rounded-full bg-red-500/50"></div>
                                        <div className="w-2 h-2 rounded-full bg-amber-500/50"></div>
                                        <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2">
                                    {logs.length === 0 ? (
                                        <div className="text-slate-700 italic text-sm text-center mt-20 font-medium tracking-widest">SISTEMA INACTIVO</div>
                                    ) : (
                                        logs.map((log, i) => (
                                            <div key={i} className="border-l-2 border-slate-700 pl-4 py-1.5 animate-in slide-in-from-right-4 duration-300">
                                                <div className="flex items-center justify-between text-[10px] mb-1">
                                                    <span className="text-slate-500 font-mono tracking-tighter">{log.time}</span>
                                                    <span className={`font-black ${log.type === 'success' ? 'text-green-500' : log.type === 'error' ? 'text-red-500' : 'text-blue-400'}`}>
                                                        {log.type.toUpperCase()}
                                                    </span>
                                                </div>
                                                <p className="text-xs text-slate-400 font-medium leading-relaxed">{log.msg}</p>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const ToolButton = ({ icon, title, desc, onClick, disabled, isSpecial, Icon }) => (
            <button 
                onClick={onClick}
                disabled={disabled}
                className={`group p-6 rounded-3xl border transition-all duration-300 text-left relative overflow-hidden h-full ${disabled ? 'opacity-40 cursor-not-allowed border-slate-100 bg-slate-50' : isSpecial ? 'border-amber-100 bg-white hover:border-amber-400 hover:shadow-xl hover:shadow-amber-100' : 'border-slate-200 bg-white hover:border-blue-400 hover:shadow-xl hover:shadow-blue-100'}`}
            >
                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mb-4 transition-transform group-hover:scale-110 ${disabled ? 'bg-slate-200 text-slate-400' : isSpecial ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/20' : 'bg-slate-50 text-blue-600 group-hover:bg-blue-600 group-hover:text-white'}`}>
                    <Icon name={icon} size={22} />
                </div>
                <h4 className="font-bold text-slate-800 transition-colors group-hover:text-blue-700 text-sm">{title}</h4>
                <p className="text-[11px] text-slate-500 mt-2 leading-relaxed font-medium">{desc}</p>
                {!disabled && (
                    <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <Icon name="Download" size={14} className={isSpecial ? 'text-amber-500' : 'text-blue-500'} />
                    </div>
                )}
            </button>
        );

        const PlaceholderPanel = ({ title, icon, Icon }) => (
            <div className="flex flex-col items-center justify-center py-20 text-center space-y-6">
                <div className="w-24 h-24 bg-white rounded-[2rem] shadow-xl flex items-center justify-center text-slate-300 border border-slate-100">
                    <Icon name={icon} size={48} />
                </div>
                <div>
                    <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">{title}</h2>
                    <p className="text-slate-500 mt-2 max-w-sm mx-auto text-sm leading-relaxed">
                        Este módulo de consulta externa requiere conexión a servidores seguros para web scraping en tiempo real.
                    </p>
                </div>
                <div className="flex gap-3">
                    <button className="px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-slate-800 shadow-xl shadow-slate-900/20 transition-all active:scale-95">Solicitar Acceso</button>
                    <button className="px-8 py-3 border border-slate-200 text-slate-600 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-white hover:shadow-md transition-all active:scale-95">Docs</button>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
